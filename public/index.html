<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dental App Authentication Mockup</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f7fa;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; color: #2c3e50; }
    h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; }
    
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover { background-color: #2980b9; }
    
    .flex-grid {
      display: flex;
      gap: 20px;
    }
    .flex-grid > div {
      flex: 1;
    }
    
    .output {
      background: #2d2d2d;
      color: #00ff00;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      white-space: pre-wrap;
      overflow-x: auto;
      margin-top: 15px;
      min-height: 100px;
    }
    
    .tabs {
      display: flex;
      margin-bottom: 20px;
      gap: 10px;
    }
    .tab {
      padding: 10px 20px;
      background: #eee;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }
    .tab.active {
      background: #3498db;
      color: white;
    }
    
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="container">
  <div style="position: relative;">
    <h1>Authentication Mockup</h1>
    <button onclick="handleLogout()" style="position: absolute; right: 0; top: 15px; width: auto; background-color: #e74c3c; padding: 8px 16px;">Logout</button>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('user')">User Auth</div>
    <div class="tab" onclick="switchTab('admin')">Admin Auth</div>
    <div class="tab" onclick="switchTab('upload')">Image Upload</div>
  </div>

  <!-- USER AUTH PANEL -->
  <div id="user" class="panel active">
    <div class="flex-grid">
      <div>
        <h2>User Signup</h2>
        <form onsubmit="handleSignup(event, 'user')">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="userSignupFirst" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="userSignupLast" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="userSignupEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="userSignupPassword" required>
          </div>
          <button type="submit">Sign Up</button>
        </form>
      </div>

      <div>
        <h2>User Login</h2>
        <form onsubmit="handleLogin(event, 'user')">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="userLoginEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="userLoginPassword" required>
          </div>
          <button type="submit">Log In</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ADMIN AUTH PANEL -->
  <div id="admin" class="panel">
    <div class="flex-grid">
      <div>
        <h2>Admin Signup</h2>
        <form onsubmit="handleSignup(event, 'admin')">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="adminSignupFirst" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="adminSignupLast" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="adminSignupEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="adminSignupPassword" required>
          </div>
          <button type="submit">Sign Up</button>
        </form>
      </div>

      <div>
        <h2>Admin Login</h2>
        <form onsubmit="handleLogin(event, 'admin')">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="adminLoginEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="adminLoginPassword" required>
          </div>
          <button type="submit">Log In</button>
        </form>
      </div>
    </div>
  </div>

  <!-- IMAGE UPLOAD PANEL -->
  <div id="upload" class="panel">
    <h2>Upload Dental Image</h2>
    <p>Please log in as a user first to get an authentication token.</p>
    <form onsubmit="handleImageUpload(event)">
      <div class="form-group">
        <label>Select Image File</label>
        <input type="file" id="imageInput" accept="image/*" required>
      </div>
      <button type="submit">Upload Image</button>
    </form>
  </div>

  <h2>Response / Output</h2>
  <div class="output" id="output">Responses will appear here...</div>
</div>

<script>
  function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    
    event.target.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  }

  function displayOutput(data) {
    const outputDiv = document.getElementById('output');
    outputDiv.textContent = JSON.stringify(data, null, 2);
  }

  function handleLogout() {
    localStorage.removeItem('firebaseToken');
    displayOutput({ message: "Logged out successfully. Token removed from local storage." });
  }

  async function handleSignup(e, type) {
    e.preventDefault();
    const endpoint = type === 'admin' ? '/api/admin/auth/signup' : '/api/auth/signup';
    
    const body = {
      firstName: document.getElementById(`${type}SignupFirst`).value,
      lastName: document.getElementById(`${type}SignupLast`).value,
      email: document.getElementById(`${type}SignupEmail`).value,
      password: document.getElementById(`${type}SignupPassword`).value
    };

    try {
      document.getElementById('output').textContent = 'Loading...';
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      displayOutput({ status: response.status, ...data });
    } catch (err) {
      displayOutput({ error: err.message });
    }
  }

  async function handleLogin(e, type) {
    e.preventDefault();
    const endpoint = type === 'admin' ? '/api/admin/auth/login' : '/api/auth/login';
    
    const body = {
      email: document.getElementById(`${type}LoginEmail`).value,
      password: document.getElementById(`${type}LoginPassword`).value
    };

    try {
      document.getElementById('output').textContent = 'Loading...';
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      displayOutput({ status: response.status, ...data });
      
      // If login is successful, you could save the token in localStorage here for protected routes
      if (data.token) {
        localStorage.setItem('firebaseToken', data.token);
      }
    } catch (err) {
      displayOutput({ error: err.message });
    }
  }

  async function handleImageUpload(e) {
    e.preventDefault();
    const token = localStorage.getItem('firebaseToken');
    if (!token) {
      displayOutput({ error: "You must log in first to get an authorization token." });
      return;
    }

    const fileInput = document.getElementById('imageInput');
    if (!fileInput.files[0]) {
      displayOutput({ error: "Please select a file." });
      return;
    }

    const formData = new FormData();
    formData.append('image', fileInput.files[0]);

    try {
      document.getElementById('output').textContent = 'Uploading to Cloudinary...';
      const response = await fetch('/api/dental-images/upload', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`
        },
        body: formData
      });
      const data = await response.json();
      displayOutput({ status: response.status, ...data });
    } catch (err) {
      displayOutput({ error: err.message });
    }
  }
</script>
</body>
</html>
