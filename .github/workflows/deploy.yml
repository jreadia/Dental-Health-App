name: CI/CD Pipeline for Render

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests (Requires Firebase Secrets)
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          PORT: 3000
        run: npm test

      - uses: chrnorm/deployment-action@v2
        name: Create GitHub deployment
        id: deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          token: '${{ github.token }}'
          environment: production

      - name: Trigger Render Deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Render Deploy Hook found. Triggering deployment..."
            curl -X POST $RENDER_DEPLOY_HOOK
          else
            echo "Warning: No RENDER_DEPLOY_HOOK secret found. Tests passed, but skipping deployment."
            echo "Please add RENDER_DEPLOY_HOOK to your GitHub Secrets."
          fi

      - name: Update deployment status (success)
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status (failure)
        if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
